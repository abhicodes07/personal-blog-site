{% extends "layout.html" %}

{% block title %}
Posts
{% endblock %}

{% block content %}
<!-- page title -->
<div class="flex flex-col items-start gap-2 mb-10">
  <div class="flex items-center gap-3 text-xs uppercase tracking-[0.2em] font-bold text-ctp-overlay0">
    <span class="material-symbols-outlined text-sm">archive</span>
    ARCHIVE
  </div>
  <h1 class="text-4xl md:text-5xl font-bold tracking-tighter text-ctp-rosewater">All Writing</h1>
  <p class="text-ctp-subtext1 text-lg">Showing all {{ total_posts }} published thoughts</p>
</div>

<!-- search & filter -->
<div class="flex flex-col md:flex-row gap-4 mb-12">
  <div class="relative flex-1">
    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-ctp-overlay1">search</span>
    <input type="text" id="search-input"
      class="w-full bg-ctp-surface0 border border-ctp-surface1 pl-12 py-3 rounded-2xl text-sm focus:border-ctp-lavender focus:outline-none placeholder:text-ctp-overlay1"
      placeholder="Search posts...">
  </div>
  <div class="relative">
    <select
      class="appearance-none bg-ctp-surface0 border border-ctp-surface1 px-5 py-3 pr-10 rounded-2xl text-sm text-ctp-subtext1 focus:border-ctp-lavender w-full md:w-auto">
      <option>Newest first</option>
      <option>Oldest first</option>
    </select>
  </div>
</div>

<!-- post list -->
<div class="space-y-6 mb-16">
  {% include "blog/partials/post_list_partial.html" %}
</div>

<!-- loading indicator -->
<div id="loading-spinner" class="htmx-indicator flex justify-center py-4">
  <span class="text-ctp-subtext1 text-sm animate-pulse">Loading…</span>
</div>

<!-- BACK TO HOME -->
<div class="my-16 flex justify-center">
  <a href="/" class="flex items-center gap-3 text-ctp-subtext1 hover:text-ctp-lavender transition-colors text-sm">
    <span class="material-symbols-outlined">arrow_back</span>
    Back to Home
  </a>
</div>
{% endblock content %}
